name: Deploy Prod

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Trust EC2 host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.EC2_SSH_PORT || '22' }}" -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure app directory exists
        run: |
          ssh -p "${{ secrets.EC2_SSH_PORT || '22' }}" "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "mkdir -p '${{ secrets.EC2_APP_DIR }}'"

      - name: Sync repository to EC2
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.EC2_SSH_PORT || '22' }}" \
            --exclude '.git' \
            --exclude '.env' \
            --exclude 'node_modules' \
            --exclude 'backend/node_modules' \
            --exclude 'Frontend/node_modules' \
            --exclude 'Frontend/dist' \
            --exclude 'backend/uploads' \
            ./ "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.EC2_APP_DIR }}/"

      - name: Deploy on EC2
        run: |
          ssh -p "${{ secrets.EC2_SSH_PORT || '22' }}" "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "cd '${{ secrets.EC2_APP_DIR }}' && chmod +x scripts/deploy-prod.sh && ./scripts/deploy-prod.sh '${{ secrets.EC2_APP_DIR }}'"
