name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test -- --runInBand

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  docker-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose files
        run: |
          docker compose --env-file .env.example -f compose.yml config >/dev/null
          docker compose --env-file .env.example -f compose.yml -f compose.dev.yml config >/dev/null
          docker compose --env-file .env.example -f compose.yml -f compose.prod.yml config >/dev/null
      - name: Build production images
        run: |
          docker build -f backend/Dockerfile --target dev backend
          docker build -f backend/Dockerfile --target runner backend
          docker build -f Frontend/Dockerfile --target prod Frontend
