services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./backend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - frontend-backend-net
      - backend-data-net

  frontend:
    image: ${FRONTEND_IMAGE:-hcm-frontend:latest}
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      target: prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # Browser calls /api/v1 on the same origin; server.cjs forwards to the API container.
      API_UPSTREAM: http://backend:3000
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5173').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - frontend-backend-net

  backend:
    image: ${BACKEND_IMAGE:-hcm-backend:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      COOKIE_SECURE: "false"
      RUN_MIGRATIONS: "true"
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-}
      DATABASE_URL: postgresql://app_user:${DB_PASSWORD:-change_me}@postgres:5432/citizen_portal
      REDIS_URL: redis://:${REDIS_PASSWORD:-change_me}@redis:6379
      STORAGE_MODE: ${STORAGE_MODE:-local}
      S3_BUCKET: ${S3_BUCKET:-portal-private-files}
      S3_SIGNED_URL_EXPIRY_SECONDS: ${S3_SIGNED_URL_EXPIRY_SECONDS:-90}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password}
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - frontend-backend-net
      - backend-data-net

  auth-stream-worker:
    image: ${AUTH_STREAM_WORKER_IMAGE:-hcm-auth-stream-worker:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      RUN_MIGRATIONS: "false"
      DATABASE_URL: postgresql://app_user:${DB_PASSWORD:-change_me}@postgres:5432/citizen_portal
      REDIS_URL: redis://:${REDIS_PASSWORD:-change_me}@redis:6379
      STORAGE_MODE: ${STORAGE_MODE:-local}
      S3_BUCKET: ${S3_BUCKET:-portal-private-files}
      S3_SIGNED_URL_EXPIRY_SECONDS: ${S3_SIGNED_URL_EXPIRY_SECONDS:-90}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password}
    volumes:
      - uploads-data:/app/uploads
    command: ["npm", "run", "worker:auth-stream"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - backend-data-net

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend-data-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: citizen_portal
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
    command: ["postgres", "-c", "max_connections=50", "-c", "shared_buffers=64MB", "-c", "effective_cache_size=128MB", "-c", "work_mem=4MB", "-c", "shared_preload_libraries=pg_stat_statements"]
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/db/postgres/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d citizen_portal"]
      interval: 20s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend-data-net

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-change_me}", "--maxmemory", "64mb", "--maxmemory-policy", "noeviction", "--bind", "0.0.0.0"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-change_me} ping"]
      interval: 20s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend-data-net

networks:
  frontend-backend-net:
    driver: bridge
    name: hcm-frontend-backend
  backend-data-net:
    driver: bridge
    internal: true
    name: hcm-backend-data

volumes:
  postgres-data:
  redis-data:
  uploads-data:
  minio-data:
