worker_processes auto;

events {
  worker_connections 1024;
}

http {
  limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/m;
  limit_req_zone $binary_remote_addr zone=api_zone:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=upload_zone:10m rate=10r/m;

  upstream api_cluster {
    server api:3000;
    keepalive 64;
  }

  server {
    listen 80;
    server_name _;
    location /health {
      proxy_pass http://api_cluster/health;
      access_log off;
    }
    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name _;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    client_max_body_size 10M;

    location /health {
      proxy_pass http://api_cluster/health;
      access_log off;
    }

    location /api/v1/auth/ {
      limit_req zone=auth_zone burst=5 nodelay;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://api_cluster;
    }

    location /ws {
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 3600s;
      proxy_pass http://api_cluster;
    }

    location /api/v1/meetings/request {
      limit_req zone=upload_zone burst=5 nodelay;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://api_cluster;
    }

    location /api/v1/complaints {
      limit_req zone=upload_zone burst=5 nodelay;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://api_cluster;
    }

    location / {
      limit_req zone=api_zone burst=30 nodelay;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://api_cluster;
    }
  }
}
