services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    cpus: 0.3
    mem_limit: 64m
    networks:
      - frontend-backend-net

  api:
    image: ${API_IMAGE:-citizen-portal-api:latest}
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      RUN_MIGRATIONS: "true"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_CITIZEN_PRIVATE_KEY: ${JWT_CITIZEN_PRIVATE_KEY}
      JWT_CITIZEN_PUBLIC_KEY: ${JWT_CITIZEN_PUBLIC_KEY}
      JWT_MASTERADMIN_PRIVATE_KEY: ${JWT_MASTERADMIN_PRIVATE_KEY}
      JWT_MASTERADMIN_PUBLIC_KEY: ${JWT_MASTERADMIN_PUBLIC_KEY}
      JWT_ADMIN_PRIVATE_KEY: ${JWT_ADMIN_PRIVATE_KEY}
      JWT_ADMIN_PUBLIC_KEY: ${JWT_ADMIN_PUBLIC_KEY}
      JWT_DEO_PRIVATE_KEY: ${JWT_DEO_PRIVATE_KEY}
      JWT_DEO_PUBLIC_KEY: ${JWT_DEO_PUBLIC_KEY}
      JWT_MINISTER_PRIVATE_KEY: ${JWT_MINISTER_PRIVATE_KEY}
      JWT_MINISTER_PUBLIC_KEY: ${JWT_MINISTER_PUBLIC_KEY}
      AADHAAR_ENC_KEY: ${AADHAAR_ENC_KEY}
      RECAPTCHA_SECRET: ${RECAPTCHA_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO}
      STORAGE_MODE: ${STORAGE_MODE:-aws}
      S3_BUCKET: ${S3_BUCKET}
      S3_SIGNED_URL_EXPIRY_SECONDS: ${S3_SIGNED_URL_EXPIRY_SECONDS:-90}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    cpus: 2.0
    mem_limit: 750m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - frontend-backend-net
      - backend-data-net

  worker:
    image: ${JOB_WORKER_IMAGE:-citizen-portal-job-worker:latest}
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "workers/jobRunner.js"]
    environment:
      NODE_ENV: ${NODE_ENV}
      RUN_MIGRATIONS: "false"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      STORAGE_MODE: ${STORAGE_MODE:-aws}
      S3_BUCKET: ${S3_BUCKET}
      S3_SIGNED_URL_EXPIRY_SECONDS: ${S3_SIGNED_URL_EXPIRY_SECONDS:-90}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"process.exit(0)\""]
      interval: 30s
      timeout: 5s
      retries: 3
    cpus: 0.5
    mem_limit: 128m
    networks:
      - backend-data-net

  auth-stream-worker:
    image: ${AUTH_STREAM_WORKER_IMAGE:-citizen-portal-auth-stream-worker:latest}
    build:
      context: .
      dockerfile: Dockerfile
    command: ["npm", "run", "worker:auth-stream"]
    environment:
      NODE_ENV: ${NODE_ENV}
      RUN_MIGRATIONS: "false"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      STORAGE_MODE: ${STORAGE_MODE:-aws}
      S3_BUCKET: ${S3_BUCKET}
      S3_SIGNED_URL_EXPIRY_SECONDS: ${S3_SIGNED_URL_EXPIRY_SECONDS:-90}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"process.exit(0)\""]
      interval: 30s
      timeout: 5s
      retries: 3
    cpus: 0.5
    mem_limit: 128m
    networks:
      - backend-data-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: citizen_portal
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    command: ["postgres", "-c", "max_connections=50", "-c", "shared_buffers=64MB", "-c", "effective_cache_size=128MB", "-c", "work_mem=4MB", "-c", "shared_preload_libraries=pg_stat_statements"]
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/postgres/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d citizen_portal"]
      interval: 20s
      timeout: 5s
      retries: 5
    cpus: 0.5
    mem_limit: 220m
    networks:
      - backend-data-net

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru", "--bind", "0.0.0.0"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping"]
      interval: 20s
      timeout: 5s
      retries: 5
    cpus: 0.2
    mem_limit: 80m
    networks:
      - backend-data-net

networks:
  frontend-backend-net:
    driver: bridge
    name: citizen-portal-frontend-backend
  backend-data-net:
    driver: bridge
    internal: true
    name: citizen-portal-backend-data

volumes:
  postgres-data:
  redis-data:
