services:
  frontend:
    build:
      target: dev
    environment:
      VITE_API_BASE_URL: /api/v1
      VITE_MINIO_PROXY_TARGET: http://minio:9000
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5173').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./Frontend:/app
      - frontend-node-modules:/app/node_modules
    networks:
      - frontend-backend-net
      - backend-data-net

  backend:
    build:
      target: dev
    env_file:
      - ./backend/.env.localhost
    environment:
      NODE_ENV: development
      COOKIE_SECURE: "false"
      RUN_MIGRATIONS: "true"
      FRONTEND_ORIGINS: http://localhost:5173
      DATABASE_URL: postgresql://app_user:${DB_PASSWORD:-change_me}@postgres:5432/citizen_portal
      REDIS_URL: redis://:${REDIS_PASSWORD:-change_me}@redis:6379
      STORAGE_MODE: ${STORAGE_MODE:-local}
      S3_BUCKET: ${S3_BUCKET:-portal-private-files}
      S3_SIGNED_URL_EXPIRY_SECONDS: ${S3_SIGNED_URL_EXPIRY_SECONDS:-90}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:5173}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password}
    command: ["npm", "run", "dev"]
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - ./backend:/app
      - backend-node-modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  auth-stream-worker:
    build:
      target: dev
    env_file:
      - ./backend/.env.localhost
    environment:
      NODE_ENV: development
      RUN_MIGRATIONS: "false"
      DATABASE_URL: postgresql://app_user:${DB_PASSWORD:-change_me}@postgres:5432/citizen_portal
      REDIS_URL: redis://:${REDIS_PASSWORD:-change_me}@redis:6379
      STORAGE_MODE: ${STORAGE_MODE:-local}
      S3_BUCKET: ${S3_BUCKET:-portal-private-files}
      S3_SIGNED_URL_EXPIRY_SECONDS: ${S3_SIGNED_URL_EXPIRY_SECONDS:-90}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:5173}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password}
    command: ["npm", "run", "worker:auth-stream"]
    volumes:
      - ./backend:/app
      - backend-node-modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: citizen_portal
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
    command: ["postgres", "-c", "max_connections=50", "-c", "shared_buffers=64MB", "-c", "effective_cache_size=128MB", "-c", "work_mem=4MB", "-c", "shared_preload_libraries=pg_stat_statements"]
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/db/postgres/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d citizen_portal"]
      interval: 20s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-change_me}", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru", "--bind", "0.0.0.0"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-change_me} ping"]
      interval: 20s
      timeout: 5s
      retries: 5

  minio:
    image: quay.io/minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password}
    ports: !override
      - "${MINIO_API_PORT:-9000}:9000"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - backend-data-net

volumes:
  frontend-node-modules:
  backend-node-modules:
  postgres-data:
  redis-data:
  minio-data:

networks:
  frontend-backend-net:
  backend-data-net:
