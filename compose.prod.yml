services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./backend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - frontend-backend-net

  frontend:
    build:
      target: prod
      args:
        VITE_API_BASE_URL: /api/v1
    environment:
      API_UPSTREAM: http://backend:3000
      PORT: 5173
    expose:
      - "5173"

  backend:
    environment:
      NODE_ENV: production
      RUN_MIGRATIONS: "true"
      # HTTP-only EC2 deployment for now. Change to true when HTTPS is added.
      COOKIE_SECURE: "false"
      STORAGE_MODE: aws
      S3_ENDPOINT: ""
      S3_PUBLIC_ENDPOINT: ""
      S3_FORCE_PATH_STYLE: "false"
    expose:
      - "3000"

  worker:
    environment:
      NODE_ENV: production
      STORAGE_MODE: aws
      S3_ENDPOINT: ""
      S3_PUBLIC_ENDPOINT: ""
      S3_FORCE_PATH_STYLE: "false"

  auth-stream-worker:
    environment:
      NODE_ENV: production
      STORAGE_MODE: aws
      S3_ENDPOINT: ""
      S3_PUBLIC_ENDPOINT: ""
      S3_FORCE_PATH_STYLE: "false"

  postgres:
    ports: []

  redis:
    ports: []
